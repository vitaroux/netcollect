async function handleImport(file){
  if(!file) return;
  const rpt=document.getElementById('importReport'); if(!rpt) return;
  rpt.innerHTML='<div style="padding:16px;text-align:center"><span class="spinner"></span> Import en cours...</div>';
  try{
    const fd=new FormData(); fd.append('file',file);
    const result=await api.upload('/api/import',fd);
    rpt.innerHTML=`<div class="card" style="margin-top:14px">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px">✅ Import terminé</div>
      <div class="kpi4" style="margin-bottom:14px">
        ${krow('Nouveaux BUS',result.imported,'#10b981','✓','')}
        ${krow('Mis à jour',result.updated,'#3b82f6','↑','')}
        ${krow('Onglets lus',Object.keys(result.sheets||{}).length,'#7c3aed','📄','')}
        ${krow('Avertissements',(result.warnings||[]).length,'#f59e0b','⚠','')}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${Object.entries(result.sheets||{}).map(([k,v])=>`<span style="font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(16,185,129,.1);color:#10b981;font-weight:500">${k} (${v} lignes)</span>`).join('')}
      </div>
      ${(result.warnings||[]).slice(0,5).map(w=>`<div style="font-size:12px;color:#f59e0b;margin-bottom:3px">⚠ ${esc(w)}</div>`).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn primary" onclick="loadAll().then(()=>navigate('bus'))">→ Voir les BUS importés</button>
      </div>
    </div>`;
    await loadAll();
  }catch(e){ rpt.innerHTML=`<div style="color:#ef4444;padding:12px">Erreur: ${e.message}</div>`; }
}

// Modal events
document.getElementById('mo-overlay').addEventListener('click',async e=>{
  const t=e.target;
  if(t===document.getElementById('mo-overlay')||t.id==='mClose'){document.getElementById('mo-overlay').className='';S.modal=null;return;}
  if(t.dataset.mtab){S.modalTab=t.dataset.mtab;renderModal();return;}
  if(t.id==='mCancel'){document.getElementById('mo-overlay').className='';S.modal=null;return;}
  if(t.id==='mSave'){
    const etat=+document.getElementById('metat')?.value;
    const comment=document.getElementById('mcmt')?.value||'';
    try{
      const updated=await api.put('/api/bus/'+encodeURIComponent(S.modal.id),{etat,comment,user:S.userName});
      const i=S.bus.findIndex(b=>b.id===S.modal.id);if(i>=0)S.bus[i]=updated;
      S.modal=updated;
      notify('BUS mis à jour');
      document.getElementById('mo-overlay').className=''; S.modal=null;
      await loadAll(); renderMain();
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
  if(t.id==='saveDlv'){
    const fields={};
    document.querySelectorAll('[data-dlvkey]').forEach(el=>fields[el.dataset.dlvkey]=el.value);
    fields.lot=S.modal.lot;
    try{ await api.put('/api/delivery/'+encodeURIComponent(S.modal.id),fields);
      const i=S.delivery.findIndex(d=>d.topo===S.modal.id);
      if(i>=0)Object.assign(S.delivery[i],fields); else S.delivery.push({topo:S.modal.id,...fields});
      notify('Delivery mis à jour');
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
  if(t.id==='postComment'){
    const body=document.getElementById('newComment')?.value?.trim();
    if(!body) return;
    try{ const c=await api.post('/api/comments/'+encodeURIComponent(S.modal.id),{body,author:S.userName});
      S.modalComments=[c,...(S.modalComments||[])];
      renderModal(); notify('Commentaire ajouté');
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
});

// ── INIT ─────────────────────────────────────────
(async()=>{
  if(localStorage.getItem('nc_dark')==='1'){S.dark=true;document.body.classList.add('dk');}
  // Vérifier si l'utilisateur est authentifié (avec timeout)
  try {
    document.getElementById('main').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px"><div class="spinner"></div><div style="font-size:14px;color:var(--sub)">Connexion au serveur...</div></div>';
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), 10000);
    let r;
    try {
      r = await fetch('/api/auth/me', {credentials:'include', signal:ctrl.signal});
      clearTimeout(tid);
    } catch(e) {
      clearTimeout(tid);
      document.getElementById('main').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px">
        <div style="font-size:36px">⚠️</div>
        <div style="font-size:16px;font-weight:600;color:var(--text)">Serveur inaccessible</div>
        <div style="font-size:13px;color:var(--sub);text-align:center;max-width:360px">Le serveur ne répond pas. Vérifiez que l'application est bien déployée sur Railway.</div>
        <button class="btn primary" onclick="location.reload()">↻ Réessayer</button>
      </div>`;
      return;
    }
    const data = await r.json();
    if (!data.authenticated) { showLogin(); return; }
    S.currentUser = data.user;
    S.userName = data.user.prenom + ' ' + data.user.nom;
  } catch(e) { showLogin(); return; }
  
  document.getElementById('main').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;gap:10px"><div class="spinner"></div><div style="font-size:14px;color:var(--sub)">Chargement des données...</div></div>';
  await loadAll();
  renderSidebar();
  renderMain();
})();
// ═══════════════════════════════════════════════
// CHAT BOT
// ═══════════════════════════════════════════════
const Chat = {
  history: [],
  open: false,

  init(){
    document.getElementById('chatBtn').addEventListener('click', ()=>Chat.toggle());
    document.getElementById('closeChatBtn').addEventListener('click', ()=>Chat.close());
    document.getElementById('chatSend').addEventListener('click', ()=>Chat.send());
    document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); Chat.send(); } });
    // Message de bienvenue
    Chat.addMsg('bot', "Bonjour\xa0! Je suis l'assistant Vi. J'suis en mode BETA donc je peux faire des erreurs 😊. Merci de me solliciter si c'est vraiment nécessaire car les tokens c'est pas gratos.\n\nComment puis-je vous aider ?");
  },

  toggle(){ Chat.open ? Chat.close() : Chat.openPanel(); },

  openPanel(){
    Chat.open = true;
    document.getElementById('chatPanel').classList.add('open');
    document.getElementById('chatBtn').innerHTML = '✕';
    setTimeout(()=>document.getElementById('chatInput').focus(), 100);
    document.getElementById('chatMsgs').scrollTop = 999999;
  },

  close(){
    Chat.open = false;
    document.getElementById('chatPanel').classList.remove('open');
    document.getElementById('chatBtn').innerHTML = '💬';
  },

  addMsg(role, text){
    const msgs = document.getElementById('chatMsgs');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    // Format markdown basique
    div.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/`(.*?)`/g,'<code style="background:var(--brd);padding:1px 5px;border-radius:4px;font-size:11px">$1</code>')
      .replace(/\n/g,'<br>');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  },

  async send(){
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    const sendBtn = document.getElementById('chatSend');
    sendBtn.disabled = true;

    Chat.addMsg('user', msg);
    Chat.history.push({ role:'user', content: msg });

    // Typing indicator
    const typingDiv = Chat.addMsg('bot', '⋯');
    typingDiv.classList.add('typing');

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: Chat.history.slice(-8) }),
      });
      const data = await r.json();
      typingDiv.remove();

      if (!r.ok) {
        Chat.addMsg('bot', '❌ ' + (data.error || 'Erreur inconnue'));
      } else {
        Chat.addMsg('bot', data.reply);
        Chat.history.push({ role:'assistant', content: data.reply });
        // Limiter l'historique
        if (Chat.history.length > 20) Chat.history = Chat.history.slice(-20);
      }
    } catch(e) {
      typingDiv.remove();
      Chat.addMsg('bot', '❌ Erreur de connexion : ' + e.message);
    }
    sendBtn.disabled = false;
    input.focus();
  }
};

// Init après le chargement de la page
document.addEventListener('DOMContentLoaded', ()=>{ setTimeout(()=>Chat.init(), 500); });


</script>
