<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NetCollect</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#eef0f5;--card:#f8f9fc;--sb:#f8f9fc;--sbb:#dde1ed;
  --text:#1a1a2e;--sub:#4a5568;--mut:#8896a8;--brd:#d4d9e8;
  --acc:#7c3aed;--al:#ede9fe;--th:#f0f2f9;--row:#f8f9fc;--ra:#f1f3f8;--hov:#e9e4f8;
  --inp:#ffffff;--inb:#c8cede;--na:#7c3aed;--nb:rgba(124,58,237,.1);--nt:#374151;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 8px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.1);
  --t0bg:#f1f5f9;--t0c:#475569;--t1bg:#dbeafe;--t1c:#1d4ed8;
  --t2bg:#ede9fe;--t2c:#6d28d9;--t3bg:#fef3c7;--t3c:#92400e;
  --t4bg:#ffedd5;--t4c:#c2410c;--t5bg:#dcfce7;--t5c:#15803d;
  --t6bg:#cffafe;--t6c:#0e7490;
}
.dk{
  --bg:#0f172a;--card:#1e293b;--sb:#0f172a;--sbb:#1e293b;
  --text:#f1f5f9;--sub:#94a3b8;--mut:#475569;--brd:#334155;
  --acc:#a78bfa;--al:rgba(167,139,250,.12);--th:#1a2744;--row:#1e293b;--ra:#1a2235;
  --hov:rgba(167,139,250,.12);--inp:#0f172a;--inb:#334155;
  --na:#a78bfa;--nb:rgba(167,139,250,.12);--nt:#64748b;
  --sh:0 1px 4px rgba(0,0,0,.4);--sh-md:0 4px 16px rgba(0,0,0,.4);
  --t0bg:rgba(100,116,139,.15);--t0c:#94a3b8;--t1bg:rgba(59,130,246,.12);--t1c:#93c5fd;
  --t2bg:rgba(139,92,246,.12);--t2c:#c4b5fd;--t3bg:rgba(234,179,8,.1);--t3c:#fde68a;
  --t4bg:rgba(249,115,22,.1);--t4c:#fdba74;--t5bg:rgba(34,197,94,.1);--t5c:#86efac;
  --t6bg:rgba(6,182,212,.1);--t6c:#67e8f9;
}

/* ── BASE ── */
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html{font-size:16px}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;font-size:1rem;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--mut)}

/* ── LAYOUT ── */
#sidebar{width:230px;background:var(--sb);border-right:1px solid var(--sbb);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
#main{flex:1;overflow-y:auto;overflow-x:hidden;height:100vh}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--sbb)}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-grp{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;padding:12px 10px 5px}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:9px;border:none;cursor:pointer;font-size:14px;margin-bottom:2px;text-align:left;background:transparent;color:var(--nt);transition:all .12s}
.sb-btn:hover{background:var(--nb);color:var(--na)}
.sb-btn.active{background:var(--nb);color:var(--na);font-weight:600}
.sb-foot{padding:14px 16px;border-top:1px solid var(--sbb)}

/* ── PAGE ── */
.page{padding:28px 32px}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-title{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.page-sub{font-size:14px;color:var(--sub);margin-top:5px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:20px;box-shadow:var(--sh)}
.section-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px}

/* ── KPI ── */
.krow{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:15px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh)}
.krow-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kcrd{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--sh)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}

/* ── PROGRESS BAR ── */
.pb-wrap{display:flex;align-items:center;gap:9px}
.pb-track{flex:1;height:6px;background:var(--brd);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;background:var(--acc);border-radius:99px}
.pb-pct{font-size:12px;color:var(--mut);min-width:32px;text-align:right}

/* ── TABLES ── */
.tbl-wrap{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.tbl-foot{padding:13px 18px;border-top:1px solid var(--brd);background:var(--th);display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:13px 16px;text-align:left;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--brd);background:var(--th);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--acc)}
td{padding:13px 16px;border-bottom:1px solid var(--brd);font-size:14px}
.trow:hover td{background:var(--hov)!important;cursor:pointer}
.even td{background:var(--row)}
.odd td{background:var(--ra)}

/* ── INPUTS ── */
input,select,textarea{
  background:var(--inp);border:1.5px solid var(--inb);color:var(--text);
  padding:9px 13px;border-radius:9px;font-size:14px;outline:none;
  font-family:inherit;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,58,237,.1)
}
input::placeholder{color:var(--mut)}
select option{background:var(--card)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;border:1.5px solid var(--brd);background:transparent;color:var(--sub);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--hov);border-color:var(--acc);color:var(--acc)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.primary:hover{opacity:.88}
.btn.sm{padding:6px 13px;font-size:13px;border-radius:7px}

/* ── MISC ── */
.flt-bar{display:flex;gap:10px;flex-wrap:wrap}
.mono{font-family:monospace;font-size:13px}
.lot-badge{font-size:13px;padding:3px 9px;border-radius:6px;background:var(--al);color:var(--acc);font-weight:600}
.pg-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--brd);background:transparent;color:var(--sub);cursor:pointer;font-size:13px;transition:all .15s}
.pg-btn:hover{border-color:var(--acc);color:var(--acc)}
.pg-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi8{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px}
.kboard{min-width:290px;background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;flex-shrink:0;box-shadow:var(--sh)}
.kcard{background:var(--th);border-radius:10px;padding:13px;border:1px solid var(--brd);margin-bottom:10px}
.uploader{border:2px dashed var(--brd);border-radius:14px;padding:52px 32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:18px}
.uploader:hover,.uploader.drag{border-color:var(--acc);background:var(--al)}

/* ── MODAL ── */
#mo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:16px}
#mo-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--brd);border-radius:14px;width:100%;max-width:800px;max-height:90vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-hdr{background:var(--acc);border-radius:14px 14px 0 0;padding:22px 26px;display:flex;justify-content:space-between}
.modal-tabs{display:flex;padding:0 26px;border-bottom:1px solid var(--brd)}
.modal-tab{padding:13px 16px;border:none;background:none;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;color:var(--sub);transition:all .12s}
.modal-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.modal-body{padding:26px}
.action-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:10px;border:1px solid var(--brd);cursor:pointer;background:var(--row);margin-bottom:9px;transition:all .15s}
.action-card:hover{background:var(--hov);border-color:var(--acc)}

/* ── NOTIFICATIONS ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}
.notif{position:fixed;bottom:24px;right:24px;padding:13px 20px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:var(--sh-md);z-index:9999;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.history-item{padding:10px 0;border-bottom:1px solid var(--brd);font-size:14px}

/* ── LOGIN PAGE ── */
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:2000;align-items:center;justify-content:center}
#login-screen.visible{display:flex}
.login-box{background:var(--card);border:1px solid var(--brd);border-radius:18px;padding:40px 44px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.login-logo-icon{width:42px;height:42px;border-radius:12px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:20px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:13px;font-weight:500;color:var(--sub);margin-bottom:6px}
.login-field input{width:100%;font-size:15px;padding:11px 14px}
.login-btn{width:100%;padding:12px;font-size:15px;font-weight:600;border-radius:10px;border:none;background:var(--acc);color:#fff;cursor:pointer;transition:opacity .15s;margin-top:4px}
.login-btn:hover{opacity:.9}
.login-btn:active{opacity:.8}
.login-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:10px 14px;color:#ef4444;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <div>
        <div style="font-size:22px;font-weight:700;color:var(--text)">NetCollect</div>
        <div style="font-size:12px;color:var(--mut)">Réseau BUS / Orange</div>
      </div>
    </div>
    <div id="loginError" class="login-error"></div>
    <div class="login-field">
      <label for="loginEmail">Adresse mail</label>
      <input id="loginEmail" type="email" placeholder="prenom.nom@entreprise.fr" autocomplete="email">
    </div>
    <div class="login-field">
      <label for="loginPassword">Mot de passe</label>
      <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">Se connecter</button>
    <div style="margin-top:20px;padding:12px 14px;background:var(--th);border-radius:9px;border:1px solid var(--brd)">
      <div style="font-size:12px;color:var(--sub);font-weight:600;margin-bottom:4px">Compte par défaut :</div>
      <div style="font-size:12px;color:var(--mut)">admin@netcollect.fr · <strong>Admin123!</strong></div>
    </div>
  </div>
</div>
<div id="sidebar"></div>
<div id="main"><div class="page" style="display:flex;align-items:center;justify-content:center;height:100%"><div class="spinner"></div> Chargement...</div></div>
<div id="mo-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────
const SC={0:{s:'Non démarré',v:'t0'},1:{s:'Design',v:'t1'},2:{s:'Delivery',v:'t2'},3:{s:'Éd. Plans',v:'t3'},4:{s:'Travaux',v:'t4'},5:{s:'Livré',v:'t5'},6:{s:'MES',v:'t6'}};
const RC={Faible:{bg:'var(--t5bg)',c:'var(--t5c)'},Moyen:{bg:'var(--t3bg)',c:'var(--t3c)'},Élevé:{bg:'rgba(239,68,68,.1)',c:'#ef4444'}};
const CC=['#7c3aed','#3b82f6','#06b6d4','#10b981','#f59e0b','#f97316','#ef4444'];
const NAV=[{id:'prod',l:'Dashboard Prod',g:'Dashboards',i:'⚡'},{id:'kpi',l:'Dashboard KPI',g:'Dashboards',i:'📊'},{id:'bus',l:'BUS / Topologies',g:'Modules',i:'🔌'},{id:'delivery',l:'Delivery',g:'Modules',i:'📦'},{id:'travaux',l:'Travaux',g:'Modules',i:'🏗'},{id:'mesures',l:'Mesures',g:'Modules',i:'📐'},{id:'cdd',l:'CDD',g:'Modules',i:'📋'},{id:'empl',l:'Emplacements',g:'Modules',i:'📍'},{id:'cpm',l:'CPM / CRMAD',g:'Modules',i:'📡'},{id:'users',l:'Utilisateurs',g:'Config',i:'👥'},{id:'import',l:'Import Excel',g:'Config',i:'📥'},{id:'settings',l:'Paramétrage',g:'Config',i:'⚙'}];

// ── STATE ────────────────────────────────────────
const S={
  page:'prod', dark:false,
  bus:[], delivery:[], mesures:[], cdd:[], emplacements:[], cpm:[], users:[], currentUser:null,
  stats:{byEtat:[],byLot:[],avGlobal:0,cfCount:0,nokCount:0,sin3Nok:0,riskHigh:0},
  fq:'',fl:'',fe:'',fr:'',fk:'',sk:'id',sd:1,pg:0,
  modal:null, modalTab:'synthese', view:'table',
  charts:{}, loading:false, userName: localStorage.getItem('nc_user') || 'Équipe'
};

// ── API ──────────────────────────────────────────
const api = {
  async get(url){ const r=await fetch(url,{credentials:'include'}); if(r.status===401){showLogin();throw new Error('Non authentifié');} if(!r.ok) throw new Error(await r.text()); return r.json(); },
  async put(url,data){ const r=await fetch(url,{method:'PUT',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); if(r.status===401){showLogin();throw new Error('Non authentifié');} if(!r.ok) throw new Error(await r.text()); return r.json(); },
  async post(url,data){ const r=await fetch(url,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); if(r.status===401){showLogin();throw new Error('Non authentifié');} if(!r.ok) throw new Error(await r.text()); return r.json(); },
  async upload(url,formData){ const r=await fetch(url,{method:'POST',credentials:'include',body:formData}); if(r.status===401){showLogin();throw new Error('Non authentifié');} if(!r.ok) throw new Error(await r.text()); return r.json(); },
  async delete(url){ const r=await fetch(url,{method:'DELETE',credentials:'include'}); if(r.status===401){showLogin();throw new Error('Non authentifié');} if(!r.ok) throw new Error(await r.text()); return r.json(); },
};

async function loadAll(){
  async function safeFetch(url, fallback){
    try {
      const r = await fetch(url, {credentials:'include'});
      if(r.status===401){ showLogin(); return fallback; }
      if(!r.ok) return fallback;
      const ct = r.headers.get('content-type')||'';
      if(!ct.includes('json')) return fallback;
      return await r.json();
    } catch(e){ return fallback; }
  }
  const [bus,delivery,mesures,cdd,emplacements,cpm,users,stats] = await Promise.all([
    safeFetch('/api/bus',          []),
    safeFetch('/api/delivery',     []),
    safeFetch('/api/mesures',      []),
    safeFetch('/api/cdd',          []),
    safeFetch('/api/emplacements', []),
    safeFetch('/api/cpm',          []),
    safeFetch('/api/users',        []),
    safeFetch('/api/stats',        {byEtat:[],byLot:[],avGlobal:0,cfCount:0,nokCount:0,sin3Nok:0,riskHigh:0}),
  ]);
  Object.assign(S, {bus,delivery,mesures,cdd,emplacements,cpm,users,stats});
}

// ── HELPERS ──────────────────────────────────────
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sbadge=e=>{const c=SC[e]||SC[0];return`<span class="badge" style="background:var(--${c.v}bg);color:var(--${c.v}c)">${c.s}</span>`;};
const rbadge=r=>{const c=RC[r]||RC.Faible;return`<span class="badge" style="background:${c.bg};color:${c.c}">${r||'–'}</span>`;};
const obadge=v=>{if(!v||v==='–')return`<span style="color:var(--mut)">–</span>`;const ok=v==='OUI'||v==='Ok';const pt=v.toLowerCase().includes('cours')||v.toLowerCase().includes('attente');const bg=ok?'var(--t5bg)':pt?'var(--t3bg)':'rgba(239,68,68,.1)';const c=ok?'var(--t5c)':pt?'var(--t3c)':'#ef4444';return`<span class="badge" style="background:${bg};color:${c}">${esc(v)}</span>`;};
const pb=(v,max=100,col='var(--acc)')=>{const p=max>0?Math.round(v/max*100):0;return`<div class="pb-wrap"><div class="pb-track"><div class="pb-fill" style="width:${p}%;background:${col}"></div></div><span class="pb-pct">${p}%</span></div>`;};
const krow=(lbl,val,col,ic,sub='')=>`<div class="krow"><div class="krow-icon" style="background:${col}20;color:${col}">${ic}</div><div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em">${lbl}</div><div style="font-size:17px;font-weight:700;color:${col}">${val}</div>${sub?`<div style="font-size:10px;color:var(--mut)">${sub}</div>`:''}</div></div>`;
const kcrd=(lbl,val,col,sub='')=>`<div class="kcrd"><div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em">${lbl}</div><div style="font-size:25px;font-weight:700;color:${col}">${val}</div>${sub?`<div style="font-size:11px;color:var(--mut)">${sub}</div>`:''}</div>`;

function notify(msg, type='success'){
  const n=document.createElement('div');
  n.className='notif';
  n.style.background=type==='error'?'#ef4444':type==='warn'?'#f59e0b':'#10b981';
  n.style.color='#fff';
  n.textContent=msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy();}catch(e){}});S.charts={};}

// ── SIDEBAR ──────────────────────────────────────

// ═══════════════════════════════════════════════
// AUTH FUNCTIONS
// ═══════════════════════════════════════════════
function showLogin(){
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('app') && (document.getElementById('app').style.display='none');
  // Bind events
  const btn = document.getElementById('loginBtn');
  const emailEl = document.getElementById('loginEmail');
  const passEl  = document.getElementById('loginPassword');
  const errEl   = document.getElementById('loginError');

  async function doLogin(){
    const email    = emailEl.value.trim();
    const password = passEl.value;
    if(!email||!password){ errEl.textContent='Veuillez remplir tous les champs'; errEl.style.display=''; return; }
    btn.textContent='Connexion...'; btn.disabled=true;
    errEl.style.display='none';
    try{
      const r = await fetch('/api/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data = await r.json();
      if(!r.ok){ errEl.textContent=data.error||'Erreur de connexion'; errEl.style.display=''; btn.textContent='Se connecter'; btn.disabled=false; return; }
      // Connexion réussie
      S.currentUser = data.user;
      S.userName    = data.user.prenom+' '+data.user.nom;
      document.getElementById('login-screen').classList.remove('visible');
      await loadAll();
      renderSidebar();
      renderMain();
    }catch(e){
      errEl.textContent='Erreur serveur: '+e.message; errEl.style.display='';
      btn.textContent='Se connecter'; btn.disabled=false;
    }
  }

  btn.onclick = doLogin;
  passEl.onkeydown = e => { if(e.key==='Enter') doLogin(); };
  emailEl.onkeydown = e => { if(e.key==='Enter') passEl.focus(); };
  setTimeout(()=>emailEl.focus(), 100);
}

async function doLogout(){
  try{ await fetch('/api/auth/logout',{method:'POST',credentials:'include'}); }catch(e){}
  S.currentUser=null; S.userName='';
  // Reset state
  Object.assign(S,{bus:[],delivery:[],mesures:[],cdd:[],emplacements:[],cpm:[],users:[],
    stats:{byEtat:[],byLot:[],avGlobal:0,cfCount:0,nokCount:0,sin3Nok:0,riskHigh:0}});
  showLogin();
}

function renderSidebar(){
  const grps=[...new Set(NAV.map(n=>n.g))];
  const cu=S.currentUser;
  const pc=PROFILE_COLORS[cu?.profil]||{bg:'var(--al)',c:'var(--acc)'};

  // Initiales avatar
  const initiales = cu
    ? (cu.prenom[0]||'').toUpperCase()+(cu.nom[0]||'').toUpperCase()
    : (S.userName||'?')[0].toUpperCase();

  let h=`
  <div class="sb-logo" style="padding:14px 14px 12px;border-bottom:1px solid var(--sbb)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:${cu?'10':'0'}px">
      <div style="width:28px;height:28px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">⚡</div>
      <div><div style="font-size:14px;font-weight:700;color:var(--text)">NetCollect</div><div style="font-size:10px;color:var(--mut)">Réseau BUS / Orange</div></div>
    </div>
    ${cu ? `
    <div style="display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--al);border-radius:8px;border:1px solid var(--brd)">
      <div style="width:32px;height:32px;border-radius:50%;background:${pc.bg};border:2px solid ${pc.c};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${pc.c};flex-shrink:0">${initiales}</div>
      <div style="min-width:0;flex:1">
        <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(cu.prenom)} ${esc(cu.nom)}</div>
        <span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:${pc.bg};color:${pc.c};margin-top:2px">${cu.profil}</span>
      </div>
      <button id="switchUserBtn" title="Changer d'utilisateur" style="background:none;border:none;cursor:pointer;color:var(--mut);font-size:14px;flex-shrink:0;padding:2px">⇄</button>
    </div>` : `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--th);border-radius:8px;border:1px dashed var(--brd);cursor:pointer" id="loginPrompt">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--brd);display:flex;align-items:center;justify-content:center;font-size:13px">👤</div>
      <div style="font-size:11px;color:var(--mut)">Sélectionner un utilisateur</div>
    </div>`}
  </div>
  <div class="sb-nav">`;

  grps.forEach(g=>{
    h+=`<div class="sb-grp">${g}</div>`;
    NAV.filter(n=>n.g===g).forEach(n=>{ h+=`<button class="sb-btn${S.page===n.id?' active':''}" data-page="${n.id}">${n.i} ${n.l}</button>`; });
  });

  h+=`</div><div class="sb-foot">
    <button class="btn sm" id="themeBtn" style="width:100%;justify-content:center;margin-bottom:6px">${S.dark?'☀ Mode clair':'🌙 Mode sombre'}</button>
    <button class="btn sm" id="logoutBtn" style="width:100%;justify-content:center;color:#ef4444;border-color:rgba(239,68,68,.3)">⎋ Déconnexion</button>

  document.getElementById('sidebar').innerHTML=h;
}

// ── MODAL SÉLECTION UTILISATEUR ──────────────────
function openUserPicker(){
  const users=S.users||[];
  const mo=document.getElementById('mo-overlay');
  mo.className='open';
  const pc=u=>{const c=PROFILE_COLORS[u.profil]||{bg:'var(--al)',c:'var(--acc)'};return c;};
  mo.innerHTML=`<div style="background:var(--card);border:1px solid var(--brd);border-radius:12px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:18px 20px 14px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:15px;font-weight:700;color:var(--text)">Qui êtes-vous ?</div>
      <button id="closePickerBtn" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--sub)">✕</button>
    </div>
    <div style="padding:16px 20px;max-height:360px;overflow-y:auto">
      ${users.length===0
        ? `<div style="text-align:center;padding:24px;color:var(--mut);font-size:12px">Aucun utilisateur créé.<br>Allez dans <strong>Utilisateurs</strong> pour en créer.</div>`
        : users.map(u=>{const c=pc(u);const ini=(u.prenom[0]||'').toUpperCase()+(u.nom[0]||'').toUpperCase();return `
        <div class="action-card" data-pick-user="${esc(u.id)}" style="margin-bottom:8px">
          <div style="width:36px;height:36px;border-radius:50%;background:${c.bg};border:2px solid ${c.c};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${c.c};flex-shrink:0">${ini}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(u.prenom)} ${esc(u.nom)}</div>
            <span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:${c.bg};color:${c.c}">${u.profil}</span>
          </div>
          ${S.currentUser&&String(S.currentUser.id)===String(u.id)?'<span style="color:#10b981;font-size:14px">✓</span>':''}
        </div>`;}).join('')}
    </div>
  </div>`;

  document.getElementById('closePickerBtn')?.addEventListener('click',()=>{mo.className='';});
  mo.addEventListener('click',e=>{if(e.target===mo)mo.className='';});
  document.querySelectorAll('[data-pick-user]').forEach(el=>el.addEventListener('click',()=>{
    const u=S.users.find(x=>String(x.id)===String(el.dataset.pickUser));
    if(u){
      S.currentUser=u;
      S.userName=u.prenom+' '+u.nom;
      localStorage.setItem('nc_user_id',String(u.id));
      mo.className='';
      renderSidebar();
      bindPageEvents();
      notify('Connecté en tant que '+u.prenom+' '+u.nom);
    }
  }));
}

    <button class="btn" id="refreshBtn">↻ Actualiser</button></div>

    </div>
    <div style="display:grid;grid-template-columns:1fr 240px;gap:14px;margin-bottom:14px">
      <div class="card">
        <div class="section-title">Répartition par état</div>
        <div style="display:flex;align-items:center;gap:16px">
          <canvas id="donutChart" width="160" height="160" style="flex-shrink:0"></canvas>
          <div style="flex:1">
            ${Object.entries(SC).map(([k,v])=>{const n=bySm[k]||0;if(!n)return'';const c=CC[+k%CC.length];return`<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><div style="width:7px;height:7px;border-radius:2px;background:${c}"></div><span style="font-size:11px;color:var(--sub);flex:1">${v.s}</span><div style="flex:2">${pb(n,total,c)}</div><span style="font-size:11px;font-weight:600;min-width:14px;text-align:right">${n}</span></div>`;}).join('')}
          </div>

      <div class="card">

          <div style="font-size:44px;font-weight:700;color:var(--acc);line-height:1">${avGlobal||0}%</div>
          <div style="font-size:12px;color:var(--sub);margin:4px 0 14px">avancement moyen</div>

        <div style="border-top:1px solid var(--brd);padding-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[1,2,3,4].map(e=>`<div style="text-align:center;padding:6px;background:var(--th);border-radius:6px"><div style="font-size:15px;font-weight:700">${bySm[e]||0}</div><div style="font-size:10px;color:var(--mut)">${SC[e].s}</div></div>`).join('')}

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">
        ${crit.map(b=>`<div class="action-card" data-busid="${esc(b.id)}">
          <div style="flex:1;min-width:0"><div class="mono" style="color:var(--acc);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.id)}</div><div style="font-size:10px;color:var(--mut)">${esc(b.rr)} · ${b.av}%</div></div>

function pageKPI(){
  const {byLot,avGlobal,byEtat,cfCount,nokCount,sin3Nok,riskHigh}=S.stats;
  const total=S.bus.length||1;
  const livres=S.bus.filter(b=>b.etat>=5).length;
  const mes_=S.bus.filter(b=>b.etat===6).length;
  const trx=S.bus.filter(b=>b.etat===4).length;
  const okT=S.mesures.reduce((a,m)=>a+m.ok,0);
  const nokT=S.mesures.reduce((a,m)=>a+m.nok,0);
  const tauxLiv=Math.round(livres/total*100);
  const tauxMES=Math.round(mes_/total*100);
  const tauxMes=okT+nokT>0?Math.round(okT/(okT+nokT)*100):0;
  const tauxCF=S.delivery.length>0?Math.round(S.delivery.filter(d=>d.cf==='OUI').length/S.delivery.length*100):0;
  const byS=Object.fromEntries((byEtat||[]).map(r=>[r.etat,r.count]));
  const lots=byLot||[];

  function gauge(pct,col,size=68){
    const r=27,c=size/2,circ=2*Math.PI*r,dash=circ*pct/100,gap=circ-dash;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--brd)" stroke-width="5.5"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${col}" stroke-width="5.5"
        stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
        transform="rotate(-90 ${c} ${c})"/>
      <text x="${c}" y="${c}" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="700" fill="${col}">${pct}%</text>
    </svg>`;
  }

  // Points d'attention data
  const alerts=[
    [riskHigh||0,'#ef4444','BUS à risque élevé','⚠'],
    [nokCount||0,'#f59e0b','Mesures NOK','📐'],
    [sin3Nok||0,'#f97316','Sites SIN3 non MAJ','🔄'],
    [S.bus.filter(b=>b.etat===4&&b.av<20).length,'#f87171','BUS travaux < 20%','🐢'],
    [S.bus.filter(b=>!b.rr||b.rr==='').length,'#94a3b8','BUS sans RR affecté','👤'],
  ];

  return `<div class="page">
    <div class="page-hdr">
      <div>
        <div class="page-title">Dashboard KPI</div>
        <div class="page-sub">${total} BUS · mis à jour ${new Date().toLocaleDateString('fr-FR')}</div>
      </div>
    </div>

    <!-- ── LIGNE 1 : 4 jauges ── -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px">
      ${[
        ['Taux livraison','Livrés + MES',tauxLiv,'#10b981',livres+'/'+total+' BUS'],
        ['Taux MES','Mise en service',tauxMES,'#06b6d4',mes_+' BUS'],
        ['Mesures OK','Tronçons conformes',tauxMes,'#3b82f6',okT+'/'+(okT+nokT||1)+' tronçons'],
        ['Cmd fermes','Sur total delivery',tauxCF,'#7c3aed',S.delivery.filter(d=>d.cf==='OUI').length+'/'+S.delivery.length],
      ].map(([t,sub,pct,col,det])=>`
        <div class="card" style="display:flex;align-items:center;gap:16px">
          ${gauge(pct,col)}
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px">${t}</div>
            <div style="font-size:12px;color:var(--mut);margin-bottom:6px">${sub}</div>
            <div style="font-size:13px;font-weight:600;color:${col}">${det}</div>
          </div>
        </div>`).join('')}
    </div>

    <!-- ── LIGNE 2 : États | Lots | Points d'attention ── -->
    <div style="display:grid;grid-template-columns:260px 1fr 260px;gap:14px;margin-bottom:14px">

      <!-- États BUS -->
      <div class="card">
        <div class="section-title">Répartition des états</div>
        <div style="height:8px;background:var(--brd);border-radius:99px;overflow:hidden;display:flex;gap:1px;margin-bottom:14px">
          ${Object.entries(SC).map(([k])=>{const n=byS[k]||0;if(!n)return'';const c=CC[+k%CC.length];return`<div style="flex:${n};background:${c}"></div>`;}).join('')}
        </div>
        ${Object.entries(SC).map(([k,v])=>{
          const n=byS[k]||0; if(!n)return'';
          const c=CC[+k%CC.length];
          const pct=Math.round(n/total*100);
          return `<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--brd)">
            <div style="width:9px;height:9px;border-radius:2px;background:${c};flex-shrink:0"></div>
            <span style="font-size:13px;color:var(--sub);flex:1">${v.s}</span>
            <span style="font-size:13px;font-weight:700;color:var(--text);min-width:22px;text-align:right">${n}</span>
            <div style="width:52px;height:4px;background:var(--brd);border-radius:99px;overflow:hidden;flex-shrink:0">
              <div style="width:${pct}%;height:100%;background:${c}"></div>
            </div>
            <span style="font-size:11px;color:var(--mut);min-width:28px;text-align:right">${pct}%</span>
          </div>`;
        }).join('')}
        <!-- Totaux résumé -->
        <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[[5,'Livrés','#10b981'],[4,'Travaux','#f97316'],[6,'MES','#06b6d4'],[0,'Non démarré','#94a3b8']].map(([e,l,c])=>`
            <div style="text-align:center;padding:7px;background:var(--th);border-radius:8px">
              <div style="font-size:17px;font-weight:700;color:${c}">${byS[e]||0}</div>
              <div style="font-size:11px;color:var(--mut)">${l}</div>
            </div>`).join('')}
        </div>
      </div>

      <!-- Avancement par lot -->
      <div class="card">
        <div class="section-title">Avancement & progression par lot</div>
        ${lots.length===0?'<div style="color:var(--mut);font-size:13px">Aucun lot</div>':
          lots.map(l=>{
            const pLiv=l.total>0?Math.round((l.livres||0)/l.total*100):0;
            const pTrx=l.total>0?Math.round((l.trx||0)/l.total*100):0;
            const pAut=Math.max(0,100-pLiv-pTrx);
            return `<div style="margin-bottom:18px">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
                <div style="font-size:14px;font-weight:700;color:var(--text)">${l.lot}</div>
                <div style="font-size:12px;color:var(--mut)">${l.total} BUS · avancement moy.&nbsp;<strong style="color:var(--acc)">${l.avMoy||0}%</strong></div>
              </div>
              <div style="display:flex;height:12px;border-radius:99px;overflow:hidden;background:var(--brd);gap:1px;margin-bottom:7px">
                <div style="width:${pLiv}%;background:#10b981" title="Livrés/MES"></div>
                <div style="width:${pTrx}%;background:#f97316" title="Travaux"></div>
                <div style="width:${pAut}%;background:var(--al)" title="Autres"></div>
              </div>
              <div style="display:flex;gap:16px">
                <span style="font-size:12px;color:#10b981;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#10b981;display:inline-block"></span>Livrés/MES ${l.livres||0} (${pLiv}%)</span>
                <span style="font-size:12px;color:#f97316;display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#f97316;display:inline-block"></span>Travaux ${l.trx||0} (${pTrx}%)</span>
                <span style="font-size:12px;color:var(--mut);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--brd);display:inline-block"></span>Autres ${l.total-(l.livres||0)-(l.trx||0)}</span>
              </div>
            </div>`;
          }).join('')}
        <!-- Totaux lot en grille -->
        <div style="margin-top:4px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-top:1px solid var(--brd);padding-top:14px">
          ${lots.map(l=>`
            <div style="background:var(--th);border-radius:9px;padding:10px 12px;border:1px solid var(--brd)">
              <div style="font-size:12px;font-weight:700;color:var(--acc);margin-bottom:6px">${l.lot}</div>
              ${[['Total',l.total,'var(--text)'],['Travaux',l.trx,'#f97316'],['Livrés',l.livres,'#10b981']].map(([label,val,c])=>`
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
                  <span style="color:var(--sub)">${label}</span>
                  <span style="font-weight:600;color:${c}">${val||0}</span>
                </div>`).join('')}
            </div>`).join('')}
        </div>
      </div>

      <!-- Points d'attention -->
      <div class="card">
        <div class="section-title">Points d'attention</div>
        ${alerts.map(([n,c,l,ic])=>`
          <div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--brd)">
            <div style="width:30px;height:30px;border-radius:8px;background:${c}15;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${ic}</div>
            <div style="flex:1;font-size:13px;color:var(--sub)">${l}</div>
            <div style="font-size:18px;font-weight:700;color:${n>0?c:'var(--mut)'}">${n}</div>
          </div>`).join('')}
        <!-- Avancement global -->
        <div style="margin-top:14px;padding:12px;background:var(--al);border-radius:9px;border:1px solid var(--brd)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
            <span style="font-size:13px;font-weight:600;color:var(--text)">Avancement global</span>
            <span style="font-size:20px;font-weight:700;color:var(--acc)">${avGlobal||0}%</span>
          </div>
          <div style="height:7px;background:var(--brd);border-radius:99px;overflow:hidden">
            <div style="width:${avGlobal||0}%;height:100%;background:var(--acc);border-radius:99px"></div>
          </div>
        </div>
      </div>

    <!-- ── LIGNE 3 : Avancement RR | Donut états ── -->

        <canvas id="rrChart" height="230"></canvas>

              const n=byS[k]||0; if(!n)return'';
              const c=CC[+k%CC.length];
              const pct=Math.round(n/total*100);
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
                <div style="width:10px;height:10px;border-radius:3px;background:${c};flex-shrink:0"></div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.s}</div>

      </div>
      ${(()=>{
        const withLiv=S.bus.filter(b=>b.liv&&b.etat<5);
        if(!withLiv.length) return '<div style="color:var(--mut);font-size:13px;text-align:center;padding:20px">Aucune date prévisionnelle renseignée</div>';
        const bySem={};
        withLiv.forEach(b=>{const k=b.liv.slice(0,9).trim();if(k)bySem[k]=(bySem[k]||0)+1;});
        const sems=Object.entries(bySem).sort(([a],[b])=>a.localeCompare(b)).slice(0,12);
        const maxN=Math.max(...sems.map(([,v])=>v),1);
        return `<div style="display:grid;grid-template-columns:repeat(${sems.length},1fr);gap:8px;align-items:flex-end;height:80px">
          ${sems.map(([s,n])=>`
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end">
              <div style="font-size:11px;font-weight:600;color:var(--acc)">${n}</div>
              <div style="width:100%;background:var(--acc);border-radius:5px 5px 0 0;height:${Math.round(n/maxN*52)+10}px;opacity:.75;min-height:10px"></div>
              <div style="font-size:10px;color:var(--mut);white-space:nowrap;text-align:center">${s}</div>
            </div>`).join('')}
        </div>`;
      })()}
    </div>
  </div>`;
}

function bindUsersEvents(){
  // Ouvrir formulaire création
  document.getElementById('openCreateUser')?.addEventListener('click',()=>{
    openUserForm(null);
  });

  // Boutons edit
  document.querySelectorAll('[data-edit-user]').forEach(el=>el.addEventListener('click',()=>{
    const u=S.users.find(x=>String(x.id)===String(el.dataset.editUser));
    if(u) openUserForm(u);
  }));

  // Boutons delete
  document.querySelectorAll('[data-del-user]').forEach(el=>el.addEventListener('click',async()=>{
    const name=el.dataset.userName;
    if(!confirm(`Supprimer l'utilisateur "${name}" ?`)) return;
    try{
      const rd=await fetch('/api/users/'+el.dataset.delUser,{method:'DELETE',credentials:'include'});
      if(!rd.ok){const e=await rd.json();return notify(e.error||'Erreur','error');}
      notify('Utilisateur supprimé');
      await loadAll(); renderMain();
    }catch(e){notify('Erreur: '+e.message,'error');}
  }));
}

function openUserForm(user){
  const overlay=document.getElementById('userFormOverlay');
  if(!overlay) return;
  document.getElementById('userFormTitle').textContent=user?'Modifier l\'utilisateur':'Nouvel utilisateur';
  document.getElementById('uf_nom').value      = user?user.nom:'';
  document.getElementById('uf_prenom').value   = user?user.prenom:'';
  document.getElementById('uf_email').value    = user?user.email:'';
  document.getElementById('uf_profil').value   = user?user.profil:'';
  document.getElementById('uf_password').value = '';
  const hintEl = document.getElementById('uf_pwd_hint');
  const defEl  = document.getElementById('uf_pwd_default');
  if(hintEl) hintEl.style.display = user?'':'none';
  if(defEl)  defEl.style.display  = user?'none':'';
  document.getElementById('userFormError').style.display='none';
  overlay.style.display='flex';
  overlay._editId = user?user.id:null;
  document.getElementById('uf_nom').focus();

  // Fermer
  document.getElementById('closeUserForm').onclick = ()=>overlay.style.display='none';
  document.getElementById('cancelUserForm').onclick = ()=>overlay.style.display='none';
  overlay.onclick = e=>{if(e.target===overlay)overlay.style.display='none';};

  // Soumettre
  document.getElementById('submitUserForm').onclick = async()=>{
    const nom    = document.getElementById('uf_nom').value.trim();
    const prenom = document.getElementById('uf_prenom').value.trim();
    const email  = document.getElementById('uf_email').value.trim();
    const profil = document.getElementById('uf_profil').value;
    const errEl  = document.getElementById('userFormError');

    // Validation front
    if(!nom)    {errEl.textContent='Le nom est obligatoire';errEl.style.display='';return;}
    if(!prenom) {errEl.textContent='Le prénom est obligatoire';errEl.style.display='';return;}
    if(!email)  {errEl.textContent="L'adresse mail est obligatoire";errEl.style.display='';return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errEl.textContent='Adresse mail invalide';errEl.style.display='';return;}
    if(!profil) {errEl.textContent='Veuillez sélectionner un profil';errEl.style.display='';return;}
    errEl.style.display='none';

    try{
      const isEdit=!!overlay._editId;
      const url = isEdit?'/api/users/'+overlay._editId:'/api/users';
      const method = isEdit?'PUT':'POST';
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({nom,prenom,email,profil,...(document.getElementById('uf_password')?.value?.trim()?{password:document.getElementById('uf_password').value.trim()}:{})})});
      const data=await r.json();
      if(!r.ok){errEl.textContent=data.error||'Erreur serveur';errEl.style.display='';return;}
      overlay.style.display='none';
      notify(isEdit?'Utilisateur mis à jour':'Utilisateur créé');
      await loadAll(); renderMain();
    }catch(e){errEl.textContent='Erreur: '+e.message;errEl.style.display='';}
  };
}

  else if(S.modalTab==='delivery') tabBody=d?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">

      <select data-dlvkey="${k}" style="padding:3px 6px;font-size:11px;width:110px"><option${d[k]==='OUI'?' selected':''}>OUI</option><option${d[k]==='NON'?' selected':''}>NON</option><option${d[k]==='En cours'?' selected':''}>En cours</option><option${d[k]==='En attente'?' selected':''}>En attente</option></select>
    </div>`).join('')}
    <div style="grid-column:1/-1;display:flex;justify-content:flex-end;padding-top:8px"><button class="btn primary" id="saveDlv">✓ Enregistrer delivery</button></div>
  </div>`:'<div style="text-align:center;padding:28px;color:var(--mut)">Aucune donnée delivery pour ce BUS</div>';
  else if(S.modalTab==='mesures') tabBody=ms.length?ms.map(m=>`<div style="padding:13px;background:var(--th);border-radius:8px;margin-bottom:10px;border:1px solid var(--brd)">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px">
      ${[['Total',m.nbT,'#6b7280'],['Mesurés',m.nbM,'#3b82f6'],['OK',m.ok,'#10b981'],['NOK',m.nok,'#ef4444']].map(([l,v,c])=>`<div><div style="font-size:10px;color:var(--mut)">${l}</div><div style="font-size:20px;font-weight:700;color:${c}">${v}</div></div>`).join('')}
    </div>${pb(m.nbM,m.nbT,'#3b82f6')}</div>`).join(''):'<div style="text-align:center;padding:28px;color:var(--mut)">Aucune mesure</div>';
  else if(S.modalTab==='cdd') tabBody=cd.length?cd.map(c=>`<div style="padding:13px;background:var(--th);border-radius:8px;margin-bottom:10px;border:1px solid var(--brd)">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="mono" style="color:var(--acc);font-weight:700">${c.sc}</span><span style="color:var(--sub);font-size:12px">${c.ns}</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--sub)">Commande</span><span class="mono" style="font-size:10px">${c.cmd}</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--sub)">MAD</span><span>${c.mad}</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--sub)">PFTO</span>${obadge(c.pfto)}</div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--sub)">SIN3</span>${obadge(c.sin3)}</div>
    </div></div>`).join(''):'<div style="text-align:center;padding:28px;color:var(--mut)">Aucun CDD</div>';
  else if(S.modalTab==='emplacements') tabBody=em.length?em.map(e=>`<div style="padding:13px;background:var(--th);border-radius:8px;margin-bottom:10px;border:1px solid var(--brd)">
    <div class="mono" style="color:var(--acc);font-weight:700;margin-bottom:10px">${e.site} · Dept ${e.dept}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${[['Équipe',e.ep],['RDV',e.rdv],['Annexe B',e.aB],['Installation',e.inst],['Consuel',e.cons],['Annexe C',e.aC]].map(([l,v])=>`<div><div style="font-size:10px;color:var(--mut);margin-bottom:3px">${l}</div>${obadge(v)}</div>`).join('')}
    </div></div>`).join(''):'<div style="text-align:center;padding:28px;color:var(--mut)">Aucun emplacement</div>';
  else tabBody=`
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Historique des modifications</div>
      ${(S.modalHistory||[]).slice(0,15).map(h=>`<div class="history-item">
        <span style="color:var(--sub);font-size:10px">${h.created_at}</span>
        <span style="font-weight:500;color:var(--text);margin:0 6px">${h.field}</span>
        <span style="color:var(--mut)">${h.old_val}</span>
        <span style="color:var(--sub)"> → </span>
        <span style="color:var(--acc)">${h.new_val}</span>
        <span style="color:var(--mut);font-size:10px;margin-left:6px">par ${h.user_name}</span>
      </div>`).join('') || '<div style="color:var(--mut)">Aucune modification enregistrée</div>'}
    </div>
    <div>
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Commentaires équipe</div>
      ${(S.modalComments||[]).map(c=>`<div style="padding:8px;background:var(--th);border-radius:6px;margin-bottom:6px;border:1px solid var(--brd)">
        <div style="font-size:10px;color:var(--mut);margin-bottom:3px">${c.created_at} · ${esc(c.author)}</div>
        <div style="font-size:12px">${esc(c.body)}</div>
      </div>`).join('') || '<div style="color:var(--mut);font-size:12px">Aucun commentaire</div>'}
      <div style="display:flex;gap:8px;margin-top:10px">
        <textarea id="newComment" rows="2" style="flex:1;resize:none;font-size:12px" placeholder="Ajouter un commentaire..."></textarea>
        <button class="btn primary" id="postComment" style="align-self:flex-end">Envoyer</button>
      </div>
    </div>`;

  const mo=document.getElementById('mo-overlay');
  mo.className='open';
  mo.innerHTML=`<div class="modal">
    <div class="modal-hdr">
      <div><div style="font-size:11px;color:rgba(255,255,255,.65);margin-bottom:2px">${b.lot} · ${b.dor}</div>
        <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px">${esc(b.id)}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.75);margin-bottom:6px">${esc(b.ext)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${sbadge(b.etat)}${rbadge(b.risque)}<span style="font-size:11px;color:rgba(255,255,255,.7)">RR: ${esc(b.rr)}</span></div>
      </div>
      <button id="mClose" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div class="modal-tabs">${TABS.map(t=>`<button class="modal-tab${S.modalTab===t?' active':''}" data-mtab="${t}">${t}</button>`).join('')}</div>
    <div class="modal-body">${tabBody}</div>
  </div>`;
}

// ── CHARTS ───────────────────────────────────────
function initCharts(){
  destroyCharts();
  const dk=S.dark;
  const tc={color:dk?'#94a3b8':'#6b7280'};
  const TTC={callbacks:{}};  // tooltip config base
  TTC.backgroundColor=dk?'#1e293b':'#ffffff';
  TTC.titleColor=dk?'#f1f5f9':'#1e1b4b';
  TTC.bodyColor=dk?'#94a3b8':'#6b7280';
  TTC.borderColor=dk?'#334155':'#e5e7eb';
  TTC.borderWidth=1;
  TTC.padding=8;
  TTC.cornerRadius=8;
  const gb={grid:{color:dk?'#1e293b':'#f0f2f7'},ticks:tc};
  const no={display:false};

  if(S.page==='prod'){
    const el=document.getElementById('donutChart'); if(!el) return;
    const byS=Object.fromEntries((S.stats.byEtat||[]).map(r=>[r.etat,r.count]));
    const labels=Object.values(SC).map(v=>v.s);
    const data=Object.keys(SC).map(k=>byS[k]||0);
    S.charts.d=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:CC,borderWidth:0}]},options:{responsive:false,plugins:{legend:{display:false}},cutout:'65%'}});
  }

  if(S.page==='kpi'){
    const byS=Object.fromEntries((S.stats.byEtat||[]).map(r=>[r.etat,r.count]));

    // Donut états
    const pie=document.getElementById('pieChart');
    if(pie){
      const labels=Object.values(SC).map(v=>v.s);
      const data=Object.keys(SC).map(k=>byS[k]||0);
      S.charts.pie=new Chart(pie,{type:'doughnut',
        data:{labels,datasets:[{data,backgroundColor:CC,borderWidth:2,borderColor:S.dark?'#1e293b':'#ffffff',hoverOffset:4}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},
          tooltip:{backgroundColor:S.dark?'#1e293b':'#fff',titleColor:S.dark?'#f1f5f9':'#1a1a2e',bodyColor:S.dark?'#94a3b8':'#4a5568',borderColor:S.dark?'#334155':'#e5e7eb',borderWidth:1,padding:8,cornerRadius:8,
            callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} BUS (${Math.round(ctx.parsed/(data.reduce((a,b)=>a+b,0)||1)*100)}%)`}}},
          cutout:'62%'}});
    }

    // Avancement par RR — horizontal bars
    const rrc=document.getElementById('rrChart');
    if(rrc){
      const rrs=[...new Set(S.bus.map(b=>b.rr).filter(Boolean))].map(rr=>({
        rr:rr.length>12?rr.split(' ')[0]:rr,
        av:Math.round(S.bus.filter(b=>b.rr===rr).reduce((a,b)=>a+b.av,0)/Math.max(1,S.bus.filter(b=>b.rr===rr).length)),
        n:S.bus.filter(b=>b.rr===rr).length
      })).sort((a,b)=>b.av-a.av).slice(0,8);
      S.charts.rr=new Chart(rrc,{type:'bar',
        data:{labels:rrs.map(r=>r.rr),datasets:[
          {data:rrs.map(r=>r.av),backgroundColor:rrs.map(r=>r.av>=70?'#10b981':r.av>=40?'#f59e0b':'#f87171'),
           borderRadius:4,barThickness:14}
        ]},
        options:{responsive:true,indexAxis:'y',
          plugins:{legend:{display:false},tooltip:{...TTC,callbacks:{label:ctx=>`${ctx.parsed.x}% · ${rrs[ctx.dataIndex].n} BUS`}}},
          scales:{
            x:{max:100,grid:{color:S.dark?'#1e293b':'#f0f2f7'},ticks:{...tc,callback:v=>v+'%',font:{size:10}}},
            y:{grid:{display:false},ticks:{...tc,font:{size:10}}}
          }}});
    }
  }}

// ── RENDER ────────────────────────────────────────
const PAGES={prod:pageProd,kpi:pageKPI,bus:pageBUS,delivery:pageDelivery,travaux:pageTravaux,mesures:pageMesures,cdd:pageCDD,empl:pageEmpl,cpm:pageCPM,users:pageUsers,import:pageImport,settings:pageSettings};

function renderMain(){
  document.getElementById('main').innerHTML=(PAGES[S.page]||pageProd)();
  setTimeout(()=>{ initCharts(); bindPageEvents(); }, 10);
}

async function navigate(page){
  S.page=page; S.pg=0;
  renderSidebar(); renderMain();
}

function filterBus(){
  let r=[...S.bus];
  if(S.fq) r=r.filter(b=>(b.id+b.ext+b.rr).toLowerCase().includes(S.fq.toLowerCase()));
  if(S.fl) r=r.filter(b=>b.lot===S.fl);
  if(S.fe!=='') r=r.filter(b=>b.etat===+S.fe);
  if(S.fr) r=r.filter(b=>b.rr===S.fr);
  if(S.fk) r=r.filter(b=>b.risque===S.fk);
  return r.sort((a,b)=>typeof a[S.sk]==='number'?(a[S.sk]-b[S.sk])*S.sd:String(a[S.sk]||'').localeCompare(String(b[S.sk]||''))*S.sd);
}

// ── EVENTS ────────────────────────────────────────
function bindPageEvents(){
  document.querySelectorAll('[data-page]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.page)));

  // User picker
  document.getElementById('switchUserBtn')?.addEventListener('click', openUserPicker);
  document.getElementById('loginPrompt')?.addEventListener('click', openUserPicker);
  const logoutBtn=document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click',()=>{if(confirm('Se déconnecter ?')) doLogout();});
  const tb=document.getElementById('themeBtn');
  if(tb) tb.addEventListener('click',()=>{S.dark=!S.dark;document.body.classList.toggle('dk',S.dark);localStorage.setItem('nc_dark',S.dark?'1':'');renderSidebar();renderMain();});



  const rb=document.getElementById('refreshBtn');
  if(rb) rb.addEventListener('click',async()=>{await loadAll();renderMain();notify('Données actualisées');});

  document.querySelectorAll('th[data-sort]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.sort;if(S.sk===k)S.sd*=-1;else{S.sk=k;S.sd=1;}S.pg=0;renderMain();}));
  document.querySelectorAll('[data-busid]').forEach(el=>el.addEventListener('click',()=>showModal(el.dataset.busid)));

  ['fq','fl','fe','fr','fk'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',()=>{S[id]=el.value;S.pg=0;renderMain();});});
  const cf=document.getElementById('clearFlt');if(cf)cf.addEventListener('click',()=>{S.fq='';S.fl='';S.fe='';S.fr='';S.fk='';S.pg=0;renderMain();});
  const pp=document.getElementById('pgPrev');if(pp)pp.addEventListener('click',()=>{S.pg=Math.max(0,S.pg-1);renderMain();});
  const pn=document.getElementById('pgNext');if(pn)pn.addEventListener('click',()=>{const tp=Math.ceil(filterBus().length/12);S.pg=Math.min(tp-1,S.pg+1);renderMain();});
  document.querySelectorAll('[data-pg]').forEach(el=>el.addEventListener('click',()=>{S.pg=+el.dataset.pg;renderMain();}));

  // Users events
  bindUsersEvents();
  // CPM imports
  const cpmGlobal=document.getElementById('cpmFileInput');
  if(cpmGlobal) cpmGlobal.addEventListener('change',e=>handleCPMImport(e.target.files[0]));
  document.querySelectorAll('.cpmRowInput').forEach(el=>el.addEventListener('change',e=>handleCPMImport(e.target.files[0],el.dataset.bustopo)));
  document.querySelectorAll('[data-cpmtopo]').forEach(el=>el.addEventListener('click',()=>{
    const t=el.dataset.cpmtopo;
    renderCPMDetail(t);
    document.getElementById('cpmDetail')?.scrollIntoView({behavior:'smooth'});
  }));
  const vt=document.getElementById('vTable');if(vt)vt.addEventListener('click',()=>{S.view='table';renderMain();});
  const vk=document.getElementById('vKanban');if(vk)vk.addEventListener('click',()=>{S.view='kanban';renderMain();});

  const csvBtn=document.getElementById('csvBtn');
  if(csvBtn) csvBtn.addEventListener('click',()=>{const h='ID,Lot,DOR,Extrémités,État,Av%,RR,Livraison,MES,Risque';const r=filterBus().map(b=>`${b.id},${b.lot},${b.dor},"${b.ext}",${SC[b.etat].s},${b.av},${b.rr},${b.liv||''},${b.mes||''},${b.risque}`);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([[h,...r].join('\n')],{type:'text/csv'}));a.download='bus.csv';a.click();});

  // Import
  const up=document.getElementById('uploader');
  if(up){
    up.addEventListener('click',()=>document.getElementById('fileInput')?.click());
    up.addEventListener('dragover',e=>{e.preventDefault();up.classList.add('drag');});
    up.addEventListener('dragleave',()=>up.classList.remove('drag'));
    up.addEventListener('drop',e=>{e.preventDefault();up.classList.remove('drag');handleImport(e.dataTransfer.files[0]);});
    const fi=document.getElementById('fileInput');if(fi)fi.addEventListener('change',e=>handleImport(e.target.files[0]));
  }
}

async function handleImport(file){
  if(!file) return;
  const rpt=document.getElementById('importReport'); if(!rpt) return;
  rpt.innerHTML='<div style="padding:16px;text-align:center"><span class="spinner"></span> Import en cours...</div>';
  try{
    const fd=new FormData(); fd.append('file',file);
    const result=await api.upload('/api/import',fd);
    rpt.innerHTML=`<div class="card" style="margin-top:14px">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px">✅ Import terminé</div>
      <div class="kpi4" style="margin-bottom:14px">
        ${krow('Nouveaux BUS',result.imported,'#10b981','✓','')}
        ${krow('Mis à jour',result.updated,'#3b82f6','↑','')}
        ${krow('Onglets lus',Object.keys(result.sheets||{}).length,'#7c3aed','📄','')}
        ${krow('Avertissements',(result.warnings||[]).length,'#f59e0b','⚠','')}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${Object.entries(result.sheets||{}).map(([k,v])=>`<span style="font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(16,185,129,.1);color:#10b981;font-weight:500">${k} (${v} lignes)</span>`).join('')}
      </div>
      ${(result.warnings||[]).slice(0,5).map(w=>`<div style="font-size:12px;color:#f59e0b;margin-bottom:3px">⚠ ${esc(w)}</div>`).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn primary" onclick="loadAll().then(()=>navigate('bus'))">→ Voir les BUS importés</button>
      </div>
    </div>`;
    await loadAll();
  }catch(e){ rpt.innerHTML=`<div style="color:#ef4444;padding:12px">Erreur: ${e.message}</div>`; }
}

// Modal events
document.getElementById('mo-overlay').addEventListener('click',async e=>{
  const t=e.target;
  if(t===document.getElementById('mo-overlay')||t.id==='mClose'){document.getElementById('mo-overlay').className='';S.modal=null;return;}
  if(t.dataset.mtab){S.modalTab=t.dataset.mtab;renderModal();return;}
  if(t.id==='mCancel'){document.getElementById('mo-overlay').className='';S.modal=null;return;}
  if(t.id==='mSave'){
    const etat=+document.getElementById('metat')?.value;
    const comment=document.getElementById('mcmt')?.value||'';
    try{
      const updated=await api.put('/api/bus/'+encodeURIComponent(S.modal.id),{etat,comment,user:S.userName});
      const i=S.bus.findIndex(b=>b.id===S.modal.id);if(i>=0)S.bus[i]=updated;
      S.modal=updated;
      notify('BUS mis à jour');
      document.getElementById('mo-overlay').className=''; S.modal=null;
      await loadAll(); renderMain();
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
  if(t.id==='saveDlv'){
    const fields={};
    document.querySelectorAll('[data-dlvkey]').forEach(el=>fields[el.dataset.dlvkey]=el.value);
    fields.lot=S.modal.lot;
    try{ await api.put('/api/delivery/'+encodeURIComponent(S.modal.id),fields);
      const i=S.delivery.findIndex(d=>d.topo===S.modal.id);
      if(i>=0)Object.assign(S.delivery[i],fields); else S.delivery.push({topo:S.modal.id,...fields});
      notify('Delivery mis à jour');
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
  if(t.id==='postComment'){
    const body=document.getElementById('newComment')?.value?.trim();
    if(!body) return;
    try{ const c=await api.post('/api/comments/'+encodeURIComponent(S.modal.id),{body,author:S.userName});
      S.modalComments=[c,...(S.modalComments||[])];
      renderModal(); notify('Commentaire ajouté');
    }catch(er){notify('Erreur: '+er.message,'error');}
    return;
  }
});

// ── INIT ─────────────────────────────────────────
(async()=>{
  if(localStorage.getItem('nc_dark')==='1'){S.dark=true;document.body.classList.add('dk');}
  // Vérifier si l'utilisateur est authentifié
  try {
    const r = await fetch('/api/auth/me', {credentials:'include'});
    const data = await r.json();
    if (!data.authenticated) { showLogin(); return; }
    S.currentUser = data.user;
    S.userName = data.user.prenom + ' ' + data.user.nom;
  } catch(e) { showLogin(); return; }
  await loadAll();
  renderSidebar();
  renderMain();
})();
</script>
